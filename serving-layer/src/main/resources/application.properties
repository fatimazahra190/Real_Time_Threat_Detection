# ── Serveur ─────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Actuator ────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Application ─────────────────────────────────────────────────────
spring.application.name=cybersec-serving-layer

# ── HBase ───────────────────────────────────────────────────────────
hbase.host=${HBASE_HOST:hbase}
hbase.port=${HBASE_PORT:16000}
hbase.zookeeper.host=${ZOOKEEPER_HOST:zookeeper}
hbase.zookeeper.port=${ZOOKEEPER_PORT:2181}

# ── Cassandra ───────────────────────────────────────────────────────
cassandra.host=${CASSANDRA_HOST:cassandra}
cassandra.port=${CASSANDRA_PORT:9042}
cassandra.datacenter=${CASSANDRA_DC:datacenter1}
cassandra.keyspace=cybersecurity

# ── Logging ─────────────────────────────────────────────────────────
logging.level.com.cybersec=INFO
logging.level.org.springframework.web=WARN
logging.level.org.apache.hbase=WARN
logging.level.com.datastax=WARN
