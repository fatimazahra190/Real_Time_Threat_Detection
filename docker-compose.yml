version: "3.8"

networks:
  cybersec-network:
    driver: bridge

volumes:
  hdfs-namenode:
  hdfs-datanode:
  cassandra-data:
  hbase-data:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - cybersec-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - cybersec-network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  hadoop-hdfs:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-hdfs
    networks:
      - cybersec-network
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hdfs-namenode:/hadoop/dfs/name
    environment:
      CLUSTER_NAME: "cybersec-cluster"
      CORE_CONF_fs_defaultFS: "hdfs://hadoop-hdfs:9000"
      HDFS_CONF_dfs_replication: "1"
      HDFS_CONF_dfs_namenode_safemode_threshold___pct: "0"
    healthcheck:
      test: ["CMD-SHELL", "hdfs dfsadmin -safemode get 2>/dev/null | grep -q 'OFF' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hadoop-datanode
    networks:
      - cybersec-network
    depends_on:
      hadoop-hdfs:
        condition: service_healthy
    volumes:
      - hdfs-datanode:/hadoop/dfs/data
    environment:
      CORE_CONF_fs_defaultFS: "hdfs://hadoop-hdfs:9000"
      HDFS_CONF_dfs_replication: "1"

  hbase:
    image: harisekhon/hbase:2.1
    container_name: hbase
    networks:
      - cybersec-network
    depends_on:
      - hadoop-hdfs
    ports:
      - "16000:16000"
      - "16010:16010"
      - "16020:16020"
      - "16030:16030"
    volumes:
      - hbase-data:/hbase
    environment:
      HBASE_CONF_hbase_rootdir: "hdfs://hadoop-hdfs:9000/hbase"
      HBASE_CONF_hbase_zookeeper_quorum: "zookeeper"

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    networks:
      - cybersec-network
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: "cybersec-cluster"
      CASSANDRA_DC: "datacenter1"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15

  api-rest:
    build:
      context: ./serving-layer
      dockerfile: Dockerfile
    container_name: api-rest
    networks:
      - cybersec-network
    depends_on:
      cassandra:
        condition: service_healthy
      hbase:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      HBASE_HOST: hbase
      CASSANDRA_HOST: cassandra
      KAFKA_BOOTSTRAP: kafka:29092
      SERVER_PORT: 8080

  dashboard:
    image: nginx:alpine
    container_name: dashboard
    networks:
      - cybersec-network
    depends_on:
      - api-rest
    ports:
      - "3000:80"
    volumes:
      - ./dashboard/html:/usr/share/nginx/html:ro
